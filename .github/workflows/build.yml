name: Build Docker Image
on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target: [ "light", "full" ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set target platforms
        id: set-platforms
        run: |
          if [ "${{ matrix.target }}" = "light" ]; then
            echo "platforms=linux/amd64,linux/arm64" >> $GITHUB_OUTPUT
          else
            echo "platforms=linux/amd64" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}},suffix=-${{ matrix.target }}
            type=raw,value=latest,suffix=-${{ matrix.target }}
            type=semver,pattern={{version}},enable=${{ matrix.target == 'light' }}
            type=raw,value=latest,enable=${{ matrix.target == 'light' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: ${{ steps.set-platforms.outputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
